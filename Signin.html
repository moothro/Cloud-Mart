<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CloudMart | Sign in</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* ===== Page background ===== */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #e8eefc;
      background:
        radial-gradient(1200px 600px at 20% 10%, #1a3a7a 0%, rgba(26, 58, 122, 0) 60%),
        radial-gradient(900px 500px at 80% 30%, #0b5aa8 0%, rgba(11, 90, 168, 0) 55%),
        linear-gradient(180deg, #060b1a 0%, #050814 100%);
      min-height: 100vh;
    }

    /* ===== Navbar ===== */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(0, 0, 0, 0.15);
      backdrop-filter: blur(10px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: inherit;
      font-weight: 700;
    }

    .nav-logo {
      max-height: 36px;
      width: auto;
      object-fit: contain;
      display: block;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 18px;
      font-size: 14px;
    }

    .nav-links a {
      color: rgba(232, 238, 252, 0.85);
      text-decoration: none;
    }

    .nav-links a:hover {
      color: #ffffff;
    }

    .nav-btn {
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.05);
      color: #e8eefc;
      font-weight: 600;
    }

    .nav-btn:hover {
      background: rgba(255, 255, 255, 0.10);
    }

    /* ===== Page center ===== */
    .page {
      display: grid;
      place-items: center;
      padding: 60px 16px;
    }

    /* ===== Login card ===== */
    .card {
      width: 100%;
      max-width: 420px;
      padding: 22px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(10px);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .card-logo {
      width: 40px;
      height: auto;
    }

    h1 {
      font-size: 22px;
      margin: 0;
    }

    .sub {
      margin: 10px 0 18px;
      font-size: 14px;
      color: rgba(232, 238, 252, 0.8);
    }

    label {
      display: block;
      font-size: 13px;
      margin: 12px 0 6px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(0, 0, 0, 0.25);
      color: #e8eefc;
      outline: none;
      box-sizing: border-box;
    }

    input:focus {
      border-color: rgba(64, 150, 255, 0.65);
    }

    .row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-top: 10px;
      color: rgba(232, 238, 252, 0.75);
    }

    .row a {
      color: rgba(232, 238, 252, 0.85);
      text-decoration: none;
    }

    .row a:hover {
      color: #fff;
    }

    .btn {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: linear-gradient(180deg, #0b5aa8 0%, #0a2d63 100%);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    .btn:hover {
      filter: brightness(1.05);
    }

    .btn.secondary {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .btn.secondary:hover {
      background: rgba(255, 255, 255, 0.10);
      filter: none;
    }

    .msg {
      margin-top: 12px;
      font-size: 13px;
      min-height: 18px;
    }
  </style>
</head>

<body>

  <!-- ===== Navbar ===== -->
  <header class="nav">
    <a href="index.html" class="brand">
      <img src="Resources/Images/Logo.png" class="nav-logo" alt="CloudMart Logo">
      <span>CloudMart</span>
    </a>

    <nav class="nav-links">
      <a href="index.html">Features</a>
      <a href="index.html">How it works</a>
      <a href="index.html">FAQ</a>
      <a class="nav-btn" href="Signin.html">Sign in</a>
    </nav>
  </header>

  <!-- ===== Login ===== -->
  <main class="page">
    <section class="card">
      <div class="card-header">
        <img src="Resources/Images/Logo.png" class="card-logo" alt="CloudMart Logo">
        <h1 id="modeTitle">Sign in</h1>
      </div>

      <p class="sub" id="modeSub">
        Enter your username and password to continue.
      </p>

      <!-- Email only needed for Create Account -->
      <div id="emailWrap" style="display:none;">
        <label>Email (must be @my.hamptonu.edu)</label>
        <input id="email" type="email" placeholder="nick@my.hamptonu.edu">
      </div>

      <label>Username</label>
      <input id="username" type="text" placeholder="Choose a username">

      <label>Password</label>
      <input id="password" type="password" placeholder="Choose a password">

      <div class="row">
        <span id="hintText">Use your created account</span>
        <a href="#" id="toggleMode">Create an account</a>
      </div>

      <button class="btn" id="primaryBtn">Sign in</button>
      <button class="btn secondary" id="clearBtn" type="button">Clear saved demo accounts</button>

      <div class="msg" id="message"></div>
    </section>
  </main>

  <script>
    // ===== Simple front-end "database" via localStorage =====
    const USERS_KEY = "cloudmart_users";
    const LOGIN_KEY = "isLoggedIn";
    const CURRENT_USER_KEY = "currentUser";

    const emailWrap = document.getElementById("emailWrap");
    const modeTitle = document.getElementById("modeTitle");
    const modeSub = document.getElementById("modeSub");
    const hintText = document.getElementById("hintText");
    const toggleMode = document.getElementById("toggleMode");
    const primaryBtn = document.getElementById("primaryBtn");
    const clearBtn = document.getElementById("clearBtn");
    const message = document.getElementById("message");

    const emailInput = document.getElementById("email");
    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");

    let isCreateMode = false;

    function loadUsers() {
      return JSON.parse(localStorage.getItem(USERS_KEY) || "[]");
    }

    function saveUsers(users) {
      localStorage.setItem(USERS_KEY, JSON.stringify(users));
    }

    function setMsg(text) {
      message.innerText = text;
    }

    function validHamptonEmail(email) {
      // strict: must end exactly with @my.hamptonu.edu
      return typeof email === "string" && email.toLowerCase().endsWith("@my.hamptonu.edu");
    }

    function toggleUI() {
      isCreateMode = !isCreateMode;

      if (isCreateMode) {
        modeTitle.innerText = "Create account";
        modeSub.innerText = "Create your CloudMart account using a Hampton email.";
        emailWrap.style.display = "block";
        primaryBtn.innerText = "Create account";
        toggleMode.innerText = "Already have an account? Sign in";
        hintText.innerText = "Email must be @my.hamptonu.edu";
        setMsg("");
      } else {
        modeTitle.innerText = "Sign in";
        modeSub.innerText = "Enter your username and password to continue.";
        emailWrap.style.display = "none";
        primaryBtn.innerText = "Sign in";
        toggleMode.innerText = "Create an account";
        hintText.innerText = "Use your created account";
        setMsg("");
      }
    }

    toggleMode.addEventListener("click", function (e) {
      e.preventDefault();
      toggleUI();
    });

    clearBtn.addEventListener("click", function () {
      localStorage.removeItem(USERS_KEY);
      localStorage.removeItem(LOGIN_KEY);
      localStorage.removeItem(CURRENT_USER_KEY);
      setMsg("Saved demo accounts cleared.");
    });

    primaryBtn.addEventListener("click", function () {
      const email = emailInput ? emailInput.value.trim() : "";
      const username = usernameInput.value.trim();
      const password = passwordInput.value;

      if (!username || !password) {
        setMsg("Please enter a username and password.");
        return;
      }

      const users = loadUsers();

      if (isCreateMode) {
        if (!email) {
          setMsg("Please enter your Hampton email.");
          return;
        }
        if (!validHamptonEmail(email)) {
          setMsg("Email must end with @my.hamptonu.edu.");
          return;
        }

        // Prevent duplicate username OR email
        const usernameTaken = users.some(u => u.username.toLowerCase() === username.toLowerCase());
        const emailTaken = users.some(u => (u.email || "").toLowerCase() === email.toLowerCase());

        if (usernameTaken) {
          setMsg("That username is already taken.");
          return;
        }
        if (emailTaken) {
          setMsg("That email already has an account.");
          return;
        }

        users.push({ email, username, password }); // demo only (plain text)
        saveUsers(users);

        setMsg("Account created! Switch to Sign in and log in.");
        // Optional: auto-switch back to sign in
        // toggleUI();
        return;
      }

      // Sign in mode
      const found = users.find(
        u => u.username.toLowerCase() === username.toLowerCase() && u.password === password
      );

      if (!found) {
        setMsg("Invalid username or password.");
        return;
      }

      localStorage.setItem(LOGIN_KEY, "true");
      localStorage.setItem(CURRENT_USER_KEY, found.username);

      // ✅ Connect to homepage
      window.location.href = "index.html"; // change if your homepage filename differs
    });
  </script>

</body>
</html>
